# Internal Network Scan Engine - Service Discovery
# Designed for comprehensive internal network service discovery and enumeration
# Focuses on discovering and analyzing services running on internal hosts

# Global vars for all tools
scan_type: 'internal_network'
custom_header: {
  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64; rv:126.0) Gecko/20100101 Firefox/126.0',
}

# Port scanning with service detection
port_scan: {
  'timeout': 5,
  # 'exclude_ports': [],
  # 'exclude_subdomains': [],
  'ports': ['top-1000'],
  'rate_limit': 150,
  'threads': 30,
  'passive': false,
  # 'use_naabu_config': false,
  # 'enable_nmap': true,
  # 'nmap_cmd': '',
  # 'nmap_script': '',
  # 'nmap_script_args': ''
}

# HTTP crawling for web services
http_crawl: {
  'threads': 15,
  'precrawl_ports': [80, 443, 8080, 8081, 8082, 8443, 3000, 3001, 5000, 9000, 8000, 8888, 9090, 7001, 7002, 9443],
  'precrawl_uncommon_ports': true,
  'precrawl_all_ports': false,
  'precrawl_batch_size': 150
}

# Screenshots for web services
screenshot: {
  'intensity': 'normal',
  'timeout': 20,
  'threads': 25
}

# Vulnerability scanning
vulnerability_scan: {
  'run_nuclei': true,
  'run_dalfox': true,
  'run_crlfuzz': true,
  'run_s3scanner': false,
  'concurrency': 25,
  'intensity': 'normal',
  'rate_limit': 30,
  'retries': 2,
  'timeout': 15,
  'fetch_llm_report': false,
  'nuclei': {
    'use_nuclei_config': false,
    'severities': ['unknown', 'info', 'low', 'medium', 'high', 'critical'],
    'tags': ['network', 'service', 'internal', 'web']
  }
}

# URL fetching for web services
fetch_url: {
  'uses_tools': ['gospider', 'hakrawler', 'katana', 'gau'],
  'remove_duplicate_endpoints': true,
  'duplicate_fields': ['content_length', 'page_title'],
  'gf_patterns': ['debug_logic', 'idor', 'interestingEXT', 'interestingparams', 'interestingsubs', 'lfi', 'rce', 'redirect', 'sqli', 'ssrf', 'ssti', 'xss'],
  'ignore_file_extensions': ['png', 'jpg', 'jpeg', 'gif', 'mp4', 'mpeg', 'mp3'],
  'threads': 15
}

# Directory and file fuzzing for web services
dir_file_fuzz: {
  'uses_tools': ['ffuf'],
  'threads': 20,
  'timeout': 10,
  'rate_limit': 100,
  'wordlist': 'common',
  'extensions': ['.php', '.asp', '.aspx', '.jsp', '.html', '.htm', '.txt', '.xml', '.json'],
  'follow_redirect': true,
  'recursive': true,
  'max_depth': 2
}
